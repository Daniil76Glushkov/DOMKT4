<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .slider {
      width: 300px;
      height: 10px;
      background: rgb(90, 40, 40);
      position: relative;
      margin: 50px;
      
    }

    .thumb {
      width: 20px;
      height: 20px;
      background: black;
      border: 1px solid white;
      border-radius: 80%;
      position: absolute;
      top: -7px;
      left: 0;
      cursor: pointer;
    }

    .value-label {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: black;
    }
  </style>
</head>
<body>
  <div class="slider" id="slider">
    <div class="thumb" id="thumb">
      <div class="value-label" id="value">0</div>
    </div>
  </div>

  <script>
    const slider = document.getElementById("slider");
    const thumb = document.getElementById("thumb");
    const valueLabel = document.getElementById("value");

    thumb.onmousedown = function (event) {
      event.preventDefault();

      let shiftX = event.clientX - thumb.getBoundingClientRect().left;

      function onMouseMove(event) {
        let newLeft =
          event.clientX - shiftX - slider.getBoundingClientRect().left;

        if (newLeft < 0) newLeft = 0;
        let rightEdge = slider.offsetWidth - thumb.offsetWidth;
        if (newLeft > rightEdge) newLeft = rightEdge;

        thumb.style.left = newLeft + "px";

        let value = Math.round((newLeft / rightEdge) * 100);
        valueLabel.innerText = value;
      }

      document.addEventListener("mousemove", onMouseMove);

      document.onmouseup = function () {
        document.removeEventListener("mousemove", onMouseMove);
        document.onmouseup = null;
      };
    };

    thumb.ondragstart = function () {
      return false;
    };
  </script>
</body>
</html>
