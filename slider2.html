<!DOCTYPE html>
<html>
  <head>
    <style>
      .slider-container {
        width: 300px;
        margin: 60px;
        position: relative;
        user-select: none;
      }

      .slider-track {
        width: 100%;
        height: 6px;
        background: #d1e3ff;
        border-radius: 3px;
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .step-mark {
        width: 4px;
        height: 10px;
        background: #007bff;
        border-radius: 2px;
        z-index: 1;
      }

      .thumb {
        width: 24px;
        height: 24px;
        background: #007bff;
        border-radius: 50%;
        position: absolute;
        top: -9px;
        left: 0;
        cursor: pointer;
        z-index: 2;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      .value-label {
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%);
        font-family: Arial, sans-serif;
        font-weight: bold;
        color: #007bff;
      }
    </style>
  </head>
  <body>
    <div class="slider-container">
      <div class="slider-track" id="slider">
        <div class="step-mark"></div>
        <div class="step-mark"></div>
        <div class="step-mark"></div>
        <div class="step-mark"></div>
        <div class="step-mark"></div>
        <div class="step-mark"></div>

        <div class="thumb" id="thumb">
          <div class="value-label" id="value">0</div>
        </div>
      </div>
    </div>

    <script>
      const slider = document.getElementById("slider");
      const thumb = document.getElementById("thumb");
      const valueLabel = document.getElementById("value");

      thumb.onmousedown = function (event) {
        event.preventDefault();

        function moveAt(clientX) {
          let sliderRect = slider.getBoundingClientRect();
          let totalWidth = sliderRect.width - thumb.offsetWidth;

          let rawPos =
            (clientX - sliderRect.left - thumb.offsetWidth / 2) / totalWidth;

          if (rawPos < 0) rawPos = 0;
          if (rawPos > 1) rawPos = 1;

          let step = 0.2;
          let snappedPos = Math.round(rawPos / step) * step;

          thumb.style.left = snappedPos * totalWidth + "px";

          valueLabel.innerText = Math.round(snappedPos * 100);
        }

        function onMouseMove(event) {
          moveAt(event.clientX);
        }

        document.addEventListener("mousemove", onMouseMove);

        document.onmouseup = function () {
          document.removeEventListener("mousemove", onMouseMove);
          document.onmouseup = null;
        };
      };

      thumb.ondragstart = () => false;
    </script>
  </body>
</html>
