<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>слайдер2</title>
  <style>
    .slider-container {
      width: 265px;
      margin: 55px;
      position: relative;
      user-select: none;
    }

    .slider-track {
      width: 100%;
      height: 6px;
      background: rgb(255, 4, 4);
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background: rgba(22, 7, 7, 0.5);
      z-index: 1;
      pointer-events: none;
    }

    .step-mark {
      width: 4px;
      height: 10px;
      background: white;
      z-index: 1;
    }

    .thumb {
      width: 24px;
      height: 24px;
      background: rgb(2, 19, 255);
      border: 1px solid white;
      border-radius: 50%;
      position: absolute;
      top: -9px;
      left: 0;
      cursor: pointer;
      z-index: 2;
    }

    .value-label {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: black;
    }
  </style>
</head>
<body>
  <div class="slider-container">
    <div class="slider-track" id="slider">
      <div class="fill" id="fill"></div>
      <div class="step-mark"></div>
      <div class="step-mark"></div>
      <div class="step-mark"></div>
      <div class="step-mark"></div>
      <div class="step-mark"></div>
      <div class="step-mark"></div>

      <div class="thumb" id="thumb">
        <div class="value-label" id="value">0</div>
      </div>
    </div>
  </div>

  <script>
    const slider = document.getElementById("slider");
    const thumb = document.getElementById("thumb");
    const valueLabel = document.getElementById("value");
    const fill = document.getElementById("fill");

    function updateFill() {
      let thumbLeft = parseFloat(thumb.style.left) || 0;
      fill.style.width = thumbLeft + "px";
    }

    function setPosition(clientX) {
      let sliderRect = slider.getBoundingClientRect();
      let totalWidth = sliderRect.width - thumb.offsetWidth;
      
      let clickX = clientX - sliderRect.left;
      let rawPos = (clickX - thumb.offsetWidth / 2) / totalWidth;
      
      if (rawPos < 0) rawPos = 0;
      if (rawPos > 1) rawPos = 1;
      
      let step = 0.2;
      let snappedPos = Math.round(rawPos / step) * step;
      
      thumb.style.left = snappedPos * totalWidth + "px";
      valueLabel.innerText = Math.round(snappedPos * 100);
      updateFill();
    }

    // Клик по треку
    slider.onclick = function(event) {
      setPosition(event.clientX);
    };

    thumb.onmousedown = function (event) {
      event.preventDefault();
      event.stopPropagation();

      function moveAt(clientX) {
        let sliderRect = slider.getBoundingClientRect();
        let totalWidth = sliderRect.width - thumb.offsetWidth;

        let rawPos =
          (clientX - sliderRect.left - thumb.offsetWidth / 2) / totalWidth;

        if (rawPos < 0) rawPos = 0;
        if (rawPos > 1) rawPos = 1;

        let step = 0.2;
        let snappedPos = Math.round(rawPos / step) * step;

        thumb.style.left = snappedPos * totalWidth + "px";
        valueLabel.innerText = Math.round(snappedPos * 100);
        
        updateFill();
      }

      function onMouseMove(event) {
        moveAt(event.clientX);
      }

      document.addEventListener("mousemove", onMouseMove);

      document.onmouseup = function () {
        document.removeEventListener("mousemove", onMouseMove);
        document.onmouseup = null;
      };
    };

    thumb.ondragstart = () => false;
    updateFill();
  </script>
</body>
</html>
